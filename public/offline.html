<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>آفلاین | آموزشگاه نخستین</title>
    <style>
      :root {
        --bg: #fcfbff;
        --ink: #1a1430;
        --muted: #6b6480;
        --brand: #7c3aed;
        --brand-deep: #5b21b6;
        --card: #ffffff;
        --border: #e8e4f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1418;
          --ink: #f5f3ff;
          --muted: #9aa8b2;
          --card: #131f24;
          --border: #2a3a44;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: Shabnam, Tahoma, sans-serif;
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%, color-mix(in srgb, var(--brand) 18%, transparent), transparent),
          var(--bg);
        color: var(--ink);
      }
      .shell {
        width: min(100%, 26rem);
        border: 2px solid var(--border);
        border-bottom-width: 6px;
        border-radius: 1.5rem;
        background: var(--card);
        padding: 1.75rem 1.5rem;
        text-align: center;
      }
      .mark {
        width: 4.5rem;
        height: 4.5rem;
        margin: 0 auto 1.25rem;
        border-radius: 1.25rem;
        border: 2px solid var(--border);
        border-bottom-width: 4px;
        background: color-mix(in srgb, var(--brand) 12%, transparent);
        display: grid;
        place-items: center;
        color: var(--brand);
      }
      .mark svg {
        width: 2rem;
        height: 2rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.9rem;
        line-height: 1.7;
        color: var(--muted);
        font-weight: 600;
        margin-bottom: 1.5rem;
      }
      .actions {
        display: grid;
        gap: 0.65rem;
      }
      button,
      a.btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 2.75rem;
        border-radius: 0.9rem;
        font-size: 0.9rem;
        font-weight: 800;
        text-decoration: none;
        border: 2px solid transparent;
        border-bottom-width: 4px;
      }
      .primary {
        color: #fff;
        background: var(--brand);
        border-color: var(--brand-deep);
      }
      .ghost {
        color: var(--ink);
        background: transparent;
        border-color: var(--border);
      }
      .status {
        margin-top: 1rem;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--muted);
      }
      .dot {
        display: inline-block;
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 999px;
        margin-left: 0.35rem;
        background: #ef4444;
        vertical-align: middle;
      }
      .dot.on {
        background: #22c55e;
      }
    </style>
  </head>
  <body>
    <main class="shell" role="main">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M2 8.5 12 3l10 5.5v7L12 21 2 15.5v-7Z" />
          <path d="M12 12v9" />
          <path d="M2 8.5 12 14l10-5.5" />
        </svg>
      </div>
      <h1>الان آفلاین هستی</h1>
      <p>
        اتصال اینترنت قطع است. صفحاتی که قبلاً باز کرده‌ای هنوز در دسترس‌اند. به‌محض برگشت آنلاین،
        همه‌چیز دوباره همگام می‌شود.
      </p>
      <div class="actions">
        <button type="button" class="primary" onclick="location.reload()">تلاش دوباره</button>
        <a class="btn ghost" href="/">بازگشت به خانه</a>
      </div>
      <p class="status">
        <span id="dot" class="dot" aria-hidden="true"></span>
        <span id="label">بدون اتصال</span>
      </p>
    </main>
    <script>
      function sync() {
        var online = navigator.onLine;
        document.getElementById('dot').classList.toggle('on', online);
        document.getElementById('label').textContent = online ? 'آنلاین شدی — در حال بارگذاری…' : 'بدون اتصال';
        if (online) setTimeout(function () { location.replace('/'); }, 500);
      }
      window.addEventListener('online', sync);
      window.addEventListener('offline', sync);
      sync();
    </script>
  </body>
</html>
